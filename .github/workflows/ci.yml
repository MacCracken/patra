name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          TARBALL="cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          URL="https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/$TARBALL"
          # Verify the release asset exists BEFORE attempting download.
          # Pre-v1.9.0 patra CI did `curl -sLO ... && tar xzf ...`
          # blindly. If `cyrius.cyml`'s `cyrius =` pin pointed at a
          # version that hadn't been tagged on GitHub yet (e.g. local-dev
          # bumped the pin ahead of the release), curl 404'd and saved
          # the GitHub error HTML at the tarball path; tar then failed
          # with the misleading `not in gzip format`. Surface the real
          # cause: print a clear error naming the missing release.
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" -I "$URL")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "::error::Cyrius release $CYRIUS_VERSION not found on GitHub (HTTP $HTTP_CODE)."
            echo "::error::Asset URL: $URL"
            echo "::error::This usually means cyrius.cyml's 'cyrius =' pin was bumped ahead of the published release."
            echo "::error::Fix: roll the pin back to a tagged cyrius version (see https://github.com/MacCracken/cyrius/releases) or wait for $CYRIUS_VERSION to be tagged."
            exit 1
          fi
          curl -sLO "$URL"
          # Belt-and-suspenders: confirm the downloaded file is a real
          # gzipped tarball before extraction. Catches edge cases where
          # GitHub returns 200 + a non-tarball body (e.g. asset
          # mid-upload).
          if ! file "$TARBALL" | grep -q "gzip compressed"; then
            echo "::error::Downloaded $TARBALL is not a gzip archive."
            echo "::error::First 200 bytes (likely a GitHub error page):"
            head -c 200 "$TARBALL" || true
            exit 1
          fi
          tar xzf "$TARBALL"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$HOME/.cyrius/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Setup lib symlink
        run: ln -sf "$HOME/.cyrius/lib" lib

      - name: Lint
        run: |
          for f in src/file.cyr src/wal.cyr src/page.cyr src/row.cyr src/sql.cyr src/where.cyr src/btree.cyr src/table.cyr src/jsonl.cyr src/lib.cyr; do
            cyrius lint "$f" || true
          done

      - name: Build demo (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build programs/demo.cyr build/demo
          echo "demo: $(wc -c < build/demo) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/demo | grep -q "7f45 4c46"

      - name: Unit tests
        run: cyrius test tests/tcyr/patra.tcyr

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            timeout 10 "build/$name" || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          CYRIUS_DCE=1 cyrius build tests/bcyr/patra.bcyr build/bench
          ./build/bench

      - name: Integration tests
        run: |
          CYRIUS_DCE=1 cyrius build programs/test_libro.cyr build/test_libro
          ./build/test_libro
          CYRIUS_DCE=1 cyrius build programs/test_vidya.cyr build/test_vidya
          ./build/test_vidya

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve"; WARN=1
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_VERSION=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          [ "$FILE_VERSION" = "$CYML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_VERSION)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "version not in changelog"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
