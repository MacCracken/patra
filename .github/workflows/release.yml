name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} template means cyml derives version from the
          # VERSION file — VERSION is the single source of truth. Resolve
          # the template to the file content for the consistency check.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          [ "$CYML_VERSION" = "$TAG" ] || { echo "cyrius.cyml ($CYML_RAW) != tag ($TAG)"; exit 1; }

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml `[package].cyrius` pin is the single source of
          # truth for the toolchain version (CLAUDE.md § CI/Release) — no
          # version is hardcoded in this YAML. Read the pin and hand it to the
          # upstream installer, which fetches + lays out $HOME/.cyrius/{bin,lib}.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        run: cyrius deps

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build programs/demo.cyr build/demo
          echo "patra demo: $(wc -c < build/demo) bytes"

      - name: Regenerate bundle
        # v1.5.5+: bundle generation moved from scripts/bundle.sh to
        # `cyrius distlib` (reads [lib] modules from cyrius.cyml). The
        # installed cyrius version must be 5.5.26 or newer, which this
        # workflow already enforces via the Install step above (the
        # pin lives in cyrius.cyml's `[package].cyrius` field).
        run: cyrius distlib

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          rm -f cyrius-*.tar.gz
          git archive --format=tar.gz --prefix="patra-${TAG}/" -o "patra-${TAG}-src.tar.gz" HEAD
          cp dist/patra.cyr "patra-${TAG}.cyr"
          sha256sum patra-*.tar.gz patra-*.cyr build/demo > SHA256SUMS

      - name: Extract changelog
        run: |
          awk "/^## \\[${GITHUB_REF_NAME}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "patra ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            patra-*.tar.gz
            patra-*.cyr
            build/demo
            SHA256SUMS
