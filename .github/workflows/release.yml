name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_VERSION=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          [ "$CYML_VERSION" = "$TAG" ] || { echo "cyrius.cyml ($CYML_VERSION) != tag ($TAG)"; exit 1; }

      - name: Install Cyrius toolchain
        run: |
          set -e
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          TARBALL="cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          URL="https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/$TARBALL"
          # Verify the release asset exists before download — same
          # pre-flight as ci.yml (see ci.yml for the v1.9.0 first-push
          # incident that prompted this guard: pin bumped ahead of an
          # unreleased cyrius, curl 404'd, tar emitted misleading
          # "not in gzip format").
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" -I "$URL")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "::error::Cyrius release $CYRIUS_VERSION not found on GitHub (HTTP $HTTP_CODE)."
            echo "::error::Asset URL: $URL"
            echo "::error::Fix: roll cyrius.cyml's 'cyrius =' pin back to a tagged version, or wait for $CYRIUS_VERSION to be tagged."
            exit 1
          fi
          curl -sLO "$URL"
          if ! file "$TARBALL" | grep -q "gzip compressed"; then
            echo "::error::Downloaded $TARBALL is not a gzip archive."
            echo "::error::First 200 bytes (likely a GitHub error page):"
            head -c 200 "$TARBALL" || true
            exit 1
          fi
          tar xzf "$TARBALL"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$HOME/.cyrius/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Setup lib symlink
        run: ln -sf "$HOME/.cyrius/lib" lib

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build programs/demo.cyr build/demo
          echo "patra demo: $(wc -c < build/demo) bytes"

      - name: Regenerate bundle
        # v1.5.5+: bundle generation moved from scripts/bundle.sh to
        # `cyrius distlib` (reads [lib] modules from cyrius.cyml). The
        # installed cyrius version must be 5.5.26 or newer, which this
        # workflow already enforces via the Install step above (the
        # pin lives in cyrius.cyml's `[package].cyrius` field).
        run: cyrius distlib

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          rm -f cyrius-*.tar.gz
          git archive --format=tar.gz --prefix="patra-${TAG}/" -o "patra-${TAG}-src.tar.gz" HEAD
          cp dist/patra.cyr "patra-${TAG}.cyr"
          sha256sum patra-*.tar.gz patra-*.cyr build/demo > SHA256SUMS

      - name: Extract changelog
        run: |
          awk "/^## \\[${GITHUB_REF_NAME}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "patra ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            patra-*.tar.gz
            patra-*.cyr
            build/demo
            SHA256SUMS
